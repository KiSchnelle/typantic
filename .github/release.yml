changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: Breaking Changes 🛠
      labels:
        - breaking
        - semver:major
    - title: Features 🚀
      labels:
        - feature
        - enhancement
    - title: Bug Fixes 🐛
      labels:
        - bug
        - fix
    - title: Dependencies 📦
      labels:
        - dependencies
    - title: Documentation 📚
      labels:
        - documentation
        - docs
    - title: Other Changes
      labels:
        - "*"
