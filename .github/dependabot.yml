version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (bumps the SHA + version comment).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns: ["*"]

  # Keep Python deps (pyproject.toml + uv.lock) current.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    groups:
      python:
        patterns: ["*"]
