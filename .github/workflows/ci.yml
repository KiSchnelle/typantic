name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14", "3.15"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --dev --frozen
      - run: uv run pytest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync --dev --frozen
      - run: uv run ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync --dev --frozen
      - run: uv run mypy src/

  # The base install must never pull in FastAPI; the web layer needs [web].
  base-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync --frozen --no-dev
      - name: import typantic (base) stays FastAPI-free
        run: |
          uv run --no-sync python - <<'PY'
          import sys
          import typantic  # noqa: F401

          assert "fastapi" not in sys.modules, "base import pulled in fastapi"
          try:
              import typantic.web  # noqa: F401
          except ModuleNotFoundError as exc:
              assert "typantic[web]" in str(exc), exc
          else:
              raise SystemExit("typantic.web imported without the [web] extra")
          PY

  # The [web] extra must install and work on its own. The dev group happens to
  # pull the same packages, so the test suite never proves the extra itself is
  # complete — only this does.
  web-extra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync --frozen --no-dev --extra web
      - name: typantic[web] imports and serves
        run: |
          uv run --no-sync python - <<'PY'
          from typantic.web import Launcher, JobStore, make_api, serve  # noqa: F401

          app = make_api(Launcher(JobStore()), dashboard=False)
          routes = {getattr(r, "path", None) for r in app.routes}
          assert "/api/jobs" in routes, routes
          print("typantic[web] OK:", len(routes), "routes")
          PY

  # The dashboard SPA must type-check and build.
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
